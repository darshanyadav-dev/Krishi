<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Krishi 🎂</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background: linear-gradient(135deg,#ffdde1,#ee9ca7);
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
margin-bottom:15px;
}

.main-photo{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.message{
font-size:15px;
color:#444;
margin-bottom:20px;
line-height:1.5;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:12px 22px;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff1e4d;
}

#surprise{
margin-top:15px;
font-weight:bold;
color:#ff4d6d;
}

/* Gallery */

.gallery{
margin-top:25px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 5s linear infinite;
color:#ff4d6d;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Krishi 🎉</h1>

<img src="photo1.jpg" class="main-photo">

<p class="message">
Dear Krishi ❤️ <br><br>
You are one of the most wonderful people in my life.  
Your smile makes everything brighter.  

May your birthday bring you happiness, success, and beautiful memories.  

✨ Keep shining always ✨
</p>

<button onclick="showWish()">Open Birthday Surprise 🎁</button>

<p id="surprise"></p>

<h2 style="margin-top:25px;color:#ff4d6d;">📸 Memories</h2>

<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
</div>

</div>

<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* Confetti on load */

window.onload = function(){

confetti({
particleCount:150,
spread:120,
origin:{y:0.6}
});

}

/* Surprise message */

function showWish(){

document.getElementById("surprise").innerHTML =
"💖 Krishi, may your life be filled with happiness, success and endless smiles! 🎂✨";

confetti({
particleCount:200,
spread:150
});

}

/* Floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*2+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
